apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      imagePullSecrets:
        - name: dockerhub-cred
      containers:
        - name: backend-api
          image: ${IMAGE}
          resources:
            requests:
              cpu: "60m"
              memory: "5Gi"
            limits:
              cpu: "72m"
              memory: "120Mi"
          ports:
            - containerPort: 4545
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-service
spec:
  selector:
    app: backend-api
  ports:
    - port: 4545
      targetPort: 4545
  type: ClusterIP
            