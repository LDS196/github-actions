services:
  frontend:
    profiles: [frontend]
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:80"
    networks:
      - app-network

  backend:
    image: ${DOCKER_IMAGE}
    restart: unless-stopped
    ports:
      - "4545:4545"
    env_file: .env
    environment:
      PORT: 4545
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - app-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  app-network:

volumes:
  pgdata: