name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  check:
    strategy:
      matrix:
        node-version: [23, 24]
        include:
          - node-version: 24
            experimental: true
      fail-fast: false # Продолжать выполнение даже если некоторые задачи завершились с ошибкой
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental==true }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Установка зависимостей
        run: npm ci

      - name: Линтинг
        run: npm run lint

      - name: Запуск тестов
        run: npm run test
