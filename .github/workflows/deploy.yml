name: Deploy

on:
  push:
    branches: [main]

jobs:
  checks:
    uses: ./.github/workflows/pr-check.yml

  publishing:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Логин в Docker Hub
        run: echo "${{ secrets.DOCKER_PASS1 }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Сборка Docker-образа
        run: docker build -t ${{ secrets.DOCKER_USER }}/my-node-app:${{ github.sha }} .

      - name: Публикация Docker-образа
        run: docker push ${{ secrets.DOCKER_USER }}/my-node-app:${{ github.sha }}

  deploy:
    needs: publishing
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp
            git pull origin main
            cd /var/www/myapp
            docker compose up --build -d backend

  notify:
    needs: [checks,publishing, deploy]
    runs-on: ubuntu-latest
    if: always()   # ← запускается всегда, даже если checks или deploy упали
    steps:
      - name: Notify Telegram
        run: |
          CHECKS="${{ needs.checks.result }}"
          PUBLISHING="${{ needs.publishing.result }}"
          DEPLOY="${{ needs.deploy.result }}"
 
          if [ "$CHECKS" != "success" ]; then
            TEXT="❌ Тесты упали%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$PUBLISHING" != "success" ]; then
            TEXT="❌ Публикация упала%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$DEPLOY" != "success" ]; then
            TEXT="❌ Деплой упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            TEXT="✅ Деплой успешен%0A${{ github.repository }} @ ${{ github.ref_name }}"
          fi
 
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT"      
 